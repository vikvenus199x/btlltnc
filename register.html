<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="assets/css/login-register.css">
</head>
<body>
    <div class="container">
        <header id="header">
            <div class="header-content">
                <p class="header-title">
                    Đăng ký tài khoản
                </p>
                <span class="move-back">
                    <a href="index.html">Trang chủ</a>
                </span>
            </div>
        </header>

        <div id="main">
            <div class="box">
                <form action="">
                    <div class="box-content">
                        <p class="box-title">
                            Đăng ký
                        </p>
                        <div class="box-type">
                            <input type="text" class="box-input" placeholder="Nhập vào tài khoản" name="user" required>
                        </div>
                        <div class="box-type">
                            <input type="password" class="box-input" placeholder="Mật khẩu" name="password" required>
                        </div>
                        <div class="box-type">
                            <input type="password" class="box-input" placeholder="Nhập lại mật khẩu" name="repassword" required>
                        </div>
                        <div class="box-type">
                            <button class="box-btn" type="submit">ĐĂNG KÝ</button>
                        </div>
                        <div class="box-bottom">
                            <p class="box-text">
                                Đã có tài khoản?
                            </p>
                            <a href="./login.html" class="box-text ">Đăng Nhập</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
        
        <footer id="footer">

        </footer>
    </div>
</body>
</html>
